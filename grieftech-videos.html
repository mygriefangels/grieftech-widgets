<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Grief Tech Brief — Videos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --b9:#020F1E;--b8:#042C53;--b7:#0C447C;--b6:#185FA5;--b5:#2272C3;
  --b4:#378ADD;--b3:#6AAEE6;--b2:#9FCAEE;--b1:#CBE2F7;
  --accent:#0DAFE8;--white:#fff;
  --ff:'Segoe UI',system-ui,sans-serif;--r:10px;--rs:6px;
}
body{background:#0a1628;font-family:var(--ff);padding:16px 12px;min-height:100vh}
#gtv{max-width:720px;margin:0 auto}

.gtv-head{background:var(--b9);border:1px solid var(--b7);border-bottom:none;
  border-radius:var(--r) var(--r) 0 0;padding:18px 22px 13px;position:relative;overflow:hidden}
.gtv-head::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--b7),var(--accent),var(--b7))}
.gtv-head-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.gtv-brand{display:flex;align-items:center;gap:12px}
.gtv-emblem{width:44px;height:44px;border-radius:8px;background:var(--b8);border:1px solid var(--b6);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gtv-emblem svg{width:24px;height:24px}
.gtv-pub{font-size:9.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:2px}
.gtv-name{font-size:20px;font-weight:700;color:var(--white);letter-spacing:-0.3px}
.gtv-sub{font-size:10.5px;color:var(--b2);margin-top:2px}
.gtv-refresh-btn{font-size:11px;padding:5px 14px;border-radius:var(--rs);border:1px solid var(--b5);
  background:transparent;color:var(--accent);cursor:pointer;display:flex;align-items:center;gap:5px;
  font-family:var(--ff);transition:background 0.15s;white-space:nowrap}
.gtv-refresh-btn:hover{background:rgba(13,175,232,0.12)}
.gtv-refresh-btn svg{width:13px;height:13px;flex-shrink:0}
.gtv-dateline{font-size:10px;color:var(--b3);border-top:1px solid rgba(255,255,255,0.06);
  margin-top:10px;padding-top:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.gtv-live{display:flex;align-items:center;gap:5px}
.gtv-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.gtv-filters{background:#04122b;border:1px solid var(--b7);border-top:1px solid rgba(55,138,221,0.25);
  border-bottom:none;padding:10px 16px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.gtv-fl{font-size:10px;color:var(--b3);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-right:4px}
.gtv-chip{font-size:10.5px;padding:4px 12px;border-radius:20px;border:1px solid var(--b7);
  background:transparent;color:var(--b2);cursor:pointer;white-space:nowrap;
  font-family:var(--ff);transition:all 0.15s}
.gtv-chip:hover{border-color:var(--b4);color:var(--white)}
.gtv-chip.active{background:var(--b6);border-color:var(--b5);color:var(--white);font-weight:600}

.gtv-body{background:#060f1f;border:1px solid var(--b7);border-top:none;min-height:280px;padding:14px}

/* VIDEO CARDS — thumbnail + click to open YouTube */
.gtv-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px}
.gtv-card{background:var(--b9);border:1px solid rgba(55,138,221,0.2);border-radius:var(--r);
  overflow:hidden;transition:border-color 0.15s,transform 0.15s;display:flex;flex-direction:column}
.gtv-card:hover{border-color:var(--b5);transform:translateY(-2px)}

.gtv-thumb-wrap{position:relative;padding-bottom:56.25%;overflow:hidden;
  background:#0d1e33;cursor:pointer;display:block;text-decoration:none}
.gtv-thumb-img{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;
  display:block;transition:opacity 0.2s}
.gtv-thumb-wrap:hover .gtv-thumb-img{opacity:0.85}
.gtv-play-overlay{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:54px;height:54px;border-radius:50%;background:rgba(2,15,30,0.75);
  border:2px solid rgba(13,175,232,0.7);display:flex;align-items:center;justify-content:center;
  transition:background 0.15s,border-color 0.15s;pointer-events:none}
.gtv-thumb-wrap:hover .gtv-play-overlay{background:rgba(13,175,232,0.9);border-color:var(--accent)}
.gtv-play-overlay svg{width:22px;height:22px;margin-left:3px}
.gtv-thumb-fade{position:absolute;bottom:0;left:0;right:0;height:40px;
  background:linear-gradient(transparent,rgba(2,15,30,0.9));pointer-events:none}
.gtv-yt-badge{position:absolute;bottom:8px;right:9px;
  background:rgba(2,15,30,0.85);border:1px solid rgba(255,255,255,0.15);
  border-radius:4px;padding:2px 6px;font-size:9.5px;color:rgba(255,255,255,0.7);
  letter-spacing:0.5px;pointer-events:none}

.gtv-info{padding:11px 13px 13px;flex:1;display:flex;flex-direction:column;gap:6px}
.gtv-info-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.gtv-cat-tag{font-size:9.5px;padding:2px 9px;border-radius:12px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.5px}
.gtv-channel{font-size:10.5px;color:var(--b3);font-style:italic}
.gtv-title{font-size:13px;font-weight:600;color:var(--b1);line-height:1.45;flex:1}
.gtv-watch-link{font-size:11px;color:var(--accent);text-decoration:none;font-weight:600;
  display:inline-flex;align-items:center;gap:3px;letter-spacing:0.3px;margin-top:2px}
.gtv-watch-link:hover{text-decoration:underline}
.gtv-watch-link::after{content:'↗';font-size:12px}

/* no-thumb fallback */
.gtv-no-thumb{position:absolute;top:0;left:0;width:100%;height:100%;
  display:flex;align-items:center;justify-content:center;background:#0d1e33}
.gtv-no-thumb svg{width:38px;height:38px;opacity:0.3}

.gtv-loading,.gtv-empty,.gtv-error-box{padding:40px 20px;text-align:center;color:var(--b3);font-size:13px}
.gtv-spinner{width:30px;height:30px;border:2px solid rgba(55,138,221,0.2);
  border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.gtv-status-txt{font-size:11px;color:var(--b3);margin-top:7px;letter-spacing:0.4px}
.gtv-err-msg{color:#F09595;font-size:12px;margin-top:6px}

.gtv-footer{background:var(--b9);border:1px solid var(--b7);border-top:none;
  border-radius:0 0 var(--r) var(--r);padding:10px 20px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.gtv-fbrand{font-size:10.5px;color:var(--b3);letter-spacing:1px;text-transform:uppercase;font-weight:600}
.gtv-flink{font-size:11px;color:var(--b4);text-decoration:none}
.gtv-flink:hover{color:var(--accent)}
.gtv-badge{font-size:9.5px;color:var(--accent);border:1px solid rgba(13,175,232,0.3);
  border-radius:10px;padding:2px 9px;letter-spacing:0.8px;text-transform:uppercase;font-weight:600}
</style>
</head>
<body>
<div id="gtv">

  <div class="gtv-head">
    <div class="gtv-head-row">
      <div class="gtv-brand">
        <div class="gtv-emblem">
          <svg viewBox="0 0 28 28" fill="none">
            <path d="M14 25C14 25 4 18.5 4 11a10 10 0 0 1 20 0c0 7.5-10 14-10 14z" stroke="#378ADD" stroke-width="1.5"/>
            <circle cx="14" cy="11" r="3" fill="#0DAFE8"/>
            <path d="M9 11h2M17 11h2M14 8V6" stroke="#6AAEE6" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="gtv-pub">GriefTech.com Presents</div>
          <div class="gtv-name">The Grief Tech Brief</div>
          <div class="gtv-sub">Video Library — Grief &amp; Technology</div>
        </div>
      </div>
      <button class="gtv-refresh-btn" id="gtv-refresh" onclick="loadVideos()">
        <svg viewBox="0 0 16 16" fill="none"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c1.8 0 3.4.87 4.4 2.2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M12.5 2v3h-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
        Refresh
      </button>
    </div>
    <div class="gtv-dateline">
      <span id="gtv-date"></span>
      <span class="gtv-live"><span class="gtv-dot"></span>AI web search · verified links</span>
    </div>
  </div>

  <div class="gtv-filters">
    <span class="gtv-fl">Topic</span>
    <button class="gtv-chip active" data-cat="all"      onclick="filterCat('all')">All</button>
    <button class="gtv-chip"        data-cat="ai"       onclick="filterCat('ai')">AI Support</button>
    <button class="gtv-chip"        data-cat="vr"       onclick="filterCat('vr')">VR / AR</button>
    <button class="gtv-chip"        data-cat="avatar"   onclick="filterCat('avatar')">Grief Avatars</button>
    <button class="gtv-chip"        data-cat="chatbot"  onclick="filterCat('chatbot')">Chatbots</button>
    <button class="gtv-chip"        data-cat="cloning"  onclick="filterCat('cloning')">Cloning</button>
    <button class="gtv-chip"        data-cat="robotics" onclick="filterCat('robotics')">Robotics</button>
  </div>

  <div class="gtv-body" id="gtv-body">
    <div class="gtv-loading"><div class="gtv-spinner"></div>Searching for grief tech videos…</div>
  </div>

  <div class="gtv-footer">
    <span class="gtv-fbrand">The Grief Tech Brief</span>
    <a class="gtv-flink" href="https://grieftech.com" target="_blank" rel="noopener">GriefTech.com ↗</a>
    <span class="gtv-badge">AI-Powered</span>
  </div>
</div>

<script>
const CAT = {
  ai:      {label:'AI Support',    bg:'#0C447C', c:'#9FCAEE'},
  vr:      {label:'VR / AR',       bg:'#065a6e', c:'#7de2f7'},
  avatar:  {label:'Grief Avatars', bg:'#3C3489', c:'#CECBF6'},
  chatbot: {label:'Chatbots',      bg:'#085041', c:'#9FE1CB'},
  cloning: {label:'Cloning',       bg:'#633806', c:'#FAC775'},
  robotics:{label:'Robotics',      bg:'#712B13', c:'#F5C4B3'}
};

let allVideos = [], activeCat = 'all';

function thumbUrl(id){ return `https://i.ytimg.com/vi/${id}/hqdefault.jpg`; }

function render(){
  const list = activeCat==='all' ? allVideos : allVideos.filter(v=>v.cat===activeCat);
  const body = document.getElementById('gtv-body');
  if(!list.length){ body.innerHTML=`<div class="gtv-empty">No videos found for this topic.</div>`; return; }
  body.innerHTML = `<div class="gtv-grid">${list.map(v=>{
    const m = CAT[v.cat]||CAT.ai;
    const tid = v.id||'';
    const thumb = tid ? thumbUrl(tid) : '';
    return `<div class="gtv-card">
      <a class="gtv-thumb-wrap" href="https://www.youtube.com/watch?v=${tid}" target="_blank" rel="noopener" title="Watch on YouTube">
        ${thumb
          ? `<img class="gtv-thumb-img" src="${thumb}" alt="" loading="lazy">`
          : `<div class="gtv-no-thumb"><svg viewBox="0 0 24 24" fill="none"><rect x="2" y="4" width="20" height="16" rx="3" stroke="white" stroke-width="1.5"/><polygon points="10,8 17,12 10,16" fill="white"/></svg></div>`}
        <div class="gtv-play-overlay"><svg viewBox="0 0 22 22" fill="none"><polygon points="8,5 19,11 8,17" fill="white"/></svg></div>
        <div class="gtv-thumb-fade"></div>
        <span class="gtv-yt-badge">YouTube</span>
      </a>
      <div class="gtv-info">
        <div class="gtv-info-meta">
          <span class="gtv-cat-tag" style="background:${m.bg};color:${m.c}">${m.label}</span>
          ${v.channel ? `<span class="gtv-channel">${v.channel}</span>` : ''}
        </div>
        <div class="gtv-title">${v.title}</div>
        <a class="gtv-watch-link" href="https://www.youtube.com/watch?v=${tid}" target="_blank" rel="noopener">Watch on YouTube</a>
      </div>
    </div>`;
  }).join('')}</div>`;
}

function filterCat(c){
  activeCat=c;
  document.querySelectorAll('.gtv-chip').forEach(el=>el.classList.toggle('active',el.dataset.cat===c));
  render();
}

function setLoading(msg){
  document.getElementById('gtv-body').innerHTML=`<div class="gtv-loading"><div class="gtv-spinner"></div>${msg}<div class="gtv-status-txt">Using AI web search to find verified YouTube links…</div></div>`;
}

async function loadVideos(){
  const btn = document.getElementById('gtv-refresh');
  btn.disabled=true; btn.style.opacity='0.5';
  setLoading('Searching for grief tech videos…');

  const prompt = `Search YouTube right now for real, currently available public videos on these grief technology topics:
1. AI grief support and bereavement technology
2. Virtual reality grief therapy and memorials
3. Grief avatars and digital afterlife documentaries
4. Grief chatbots and AI bereavement assistants
5. Digital cloning of deceased persons, ethics
6. Grief support robots and companion robots
7. General grief technology innovation

For each video you find, verify it is a real, currently public YouTube video.
Return a JSON array of 12–16 videos. Each object must have:
- id: the exact 11-character YouTube video ID (e.g. "dQw4w9WgXcQ")
- title: the real video title (string, max 90 chars)
- channel: the YouTube channel name (string)
- cat: one of ai|vr|avatar|chatbot|cloning|robotics

Cover all cat values. Only include videos you have high confidence are real and currently public.
Return ONLY a valid JSON array. No markdown, no explanation, no code fences.`;

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        system:'You are a video researcher. Search the web and YouTube thoroughly. Only return videos you have verified exist as public YouTube videos right now. Be very careful with video IDs — they must be exactly 11 characters and correct. Return only valid JSON.',
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await res.json();
    const txt = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const match = txt.replace(/```json|```/g,'').trim().match(/\[[\s\S]*\]/);
    if(!match) throw new Error('No JSON array found in response');

    const parsed = JSON.parse(match[0]);
    // Deduplicate by id, validate 11-char IDs
    const seen = new Set();
    allVideos = parsed.filter(v=>{
      if(!v.id||v.id.length!==11||seen.has(v.id)) return false;
      if(!CAT[v.cat]) v.cat='ai';
      seen.add(v.id); return true;
    });

    document.getElementById('gtv-date').textContent =
      'Updated ' + new Date().toLocaleString('en-US',{month:'short',day:'numeric',year:'numeric',hour:'2-digit',minute:'2-digit'});
    render();
  }catch(err){
    document.getElementById('gtv-body').innerHTML=
      `<div class="gtv-error-box"><div class="gtv-err-msg">Could not load videos: ${err.message}</div><div class="gtv-status-txt" style="margin-top:8px">Try refreshing again.</div></div>`;
  }

  btn.disabled=false; btn.style.opacity='1';
}

// init
document.getElementById('gtv-date').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
loadVideos();
setInterval(loadVideos, 7200000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>The Grief Tech Brief — Videos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --b9:#020F1E;--b8:#042C53;--b7:#0C447C;--b6:#185FA5;--b5:#2272C3;
  --b4:#378ADD;--b3:#6AAEE6;--b2:#9FCAEE;--b1:#CBE2F7;
  --accent:#0DAFE8;--white:#fff;
  --ff:'Segoe UI',system-ui,sans-serif;--r:10px;--rs:6px;
}
body{background:#0a1628;font-family:var(--ff);padding:16px 12px}
#gtv{max-width:720px;margin:0 auto}

.gtv-head{background:var(--b9);border:1px solid var(--b7);border-bottom:none;
  border-radius:var(--r) var(--r) 0 0;padding:18px 22px 13px;position:relative;overflow:hidden}
.gtv-head::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
  background:linear-gradient(90deg,var(--b7),var(--accent),var(--b7))}
.gtv-head-row{display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap}
.gtv-brand{display:flex;align-items:center;gap:12px}
.gtv-emblem{width:44px;height:44px;border-radius:8px;background:var(--b8);border:1px solid var(--b6);
  display:flex;align-items:center;justify-content:center;flex-shrink:0}
.gtv-emblem svg{width:24px;height:24px}
.gtv-pub{font-size:9.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--accent);font-weight:600;margin-bottom:2px}
.gtv-name{font-size:20px;font-weight:700;color:var(--white);letter-spacing:-0.3px}
.gtv-sub{font-size:10.5px;color:var(--b2);margin-top:2px}
.gtv-dateline{font-size:10px;color:var(--b3);border-top:1px solid rgba(255,255,255,0.06);
  margin-top:10px;padding-top:8px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px}
.gtv-live{display:flex;align-items:center;gap:5px}
.gtv-dot{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

.gtv-filters{background:#04122b;border:1px solid var(--b7);border-top:1px solid rgba(55,138,221,0.2);
  border-bottom:none;padding:10px 16px;display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.gtv-fl{font-size:10px;color:var(--b3);letter-spacing:1.5px;text-transform:uppercase;font-weight:600;margin-right:4px}
.gtv-chip{font-size:10.5px;padding:4px 12px;border-radius:20px;border:1px solid var(--b7);
  background:transparent;color:var(--b2);cursor:pointer;white-space:nowrap;
  font-family:var(--ff);transition:all 0.15s}
.gtv-chip:hover{border-color:var(--b4);color:var(--white)}
.gtv-chip.active{background:var(--b6);border-color:var(--b5);color:var(--white);font-weight:600}

.gtv-body{background:#060f1f;border:1px solid var(--b7);border-top:none;padding:8px 0}

/* VIDEO LIST ROW */
.gtv-row{
  display:flex;align-items:center;gap:14px;
  padding:13px 20px;border-bottom:1px solid rgba(24,95,165,0.15);
  transition:background 0.12s;text-decoration:none;
}
.gtv-row:last-child{border-bottom:none}
.gtv-row:hover{background:rgba(55,138,221,0.07)}

.gtv-row-icon{
  flex-shrink:0;width:38px;height:38px;border-radius:8px;
  background:rgba(13,175,232,0.1);border:1px solid rgba(13,175,232,0.2);
  display:flex;align-items:center;justify-content:center;
  transition:background 0.15s;
}
.gtv-row:hover .gtv-row-icon{background:rgba(13,175,232,0.2)}
.gtv-row-icon svg{width:16px;height:16px}

.gtv-row-body{flex:1;min-width:0}
.gtv-row-meta{display:flex;align-items:center;gap:7px;margin-bottom:4px;flex-wrap:wrap}
.gtv-cat-tag{font-size:9.5px;padding:2px 9px;border-radius:12px;font-weight:700;
  text-transform:uppercase;letter-spacing:0.5px}
.gtv-channel{font-size:10.5px;color:var(--b3);font-style:italic}
.gtv-row-title{font-size:13.5px;font-weight:600;color:var(--b1);line-height:1.4;margin-bottom:3px}
.gtv-row-desc{font-size:11.5px;color:var(--b2);opacity:0.8;line-height:1.5}

.gtv-row-arrow{flex-shrink:0;font-size:18px;color:var(--accent);opacity:0.6;
  transition:opacity 0.15s,transform 0.15s}
.gtv-row:hover .gtv-row-arrow{opacity:1;transform:translateX(3px)}

.gtv-refresh-btn{font-size:10.5px;padding:4px 11px;border-radius:var(--rs);border:1px solid var(--b5);
  background:transparent;color:var(--accent);cursor:pointer;display:inline-flex;align-items:center;gap:4px;
  font-family:var(--ff);transition:background 0.15s;white-space:nowrap}
.gtv-refresh-btn:hover{background:rgba(13,175,232,0.12)}
.gtv-refresh-btn svg{width:11px;height:11px}
.gtv-spinner{display:inline-block;width:11px;height:11px;border:1.5px solid rgba(13,175,232,0.3);
  border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes spin{to{transform:rotate(360deg)}}

.gtv-footer{background:var(--b9);border:1px solid var(--b7);border-top:none;
  border-radius:0 0 var(--r) var(--r);padding:10px 20px;
  display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.gtv-fbrand{font-size:10.5px;color:var(--b3);letter-spacing:1px;text-transform:uppercase;font-weight:600}
.gtv-flink{font-size:11px;color:var(--b4);text-decoration:none}
.gtv-flink:hover{color:var(--accent)}
.gtv-badge{font-size:9.5px;color:var(--accent);border:1px solid rgba(13,175,232,0.3);
  border-radius:10px;padding:2px 9px;letter-spacing:0.8px;text-transform:uppercase;font-weight:600}
</style>
</head>
<body>
<div id="gtv">

  <div class="gtv-head">
    <div class="gtv-head-row">
      <div class="gtv-brand">
        <div class="gtv-emblem">
          <svg viewBox="0 0 28 28" fill="none">
            <path d="M14 25C14 25 4 18.5 4 11a10 10 0 0 1 20 0c0 7.5-10 14-10 14z" stroke="#378ADD" stroke-width="1.5"/>
            <circle cx="14" cy="11" r="3" fill="#0DAFE8"/>
            <path d="M9 11h2M17 11h2M14 8V6" stroke="#6AAEE6" stroke-width="1.2" stroke-linecap="round"/>
          </svg>
        </div>
        <div>
          <div class="gtv-pub">GriefTech.com Presents</div>
          <div class="gtv-name">The Grief Tech Brief</div>
          <div class="gtv-sub">Video Library — Grief &amp; Technology</div>
        </div>
      </div>
    </div>
    <div class="gtv-dateline">
      <span id="gtv-date"></span>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <span class="gtv-live"><span class="gtv-dot"></span><span id="lbl-status">Loading latest videos…</span></span>
        <button class="gtv-refresh-btn" id="gtv-refresh" onclick="fetchVideos()">
          <svg viewBox="0 0 16 16" fill="none"><path d="M13.5 8A5.5 5.5 0 1 1 8 2.5c1.8 0 3.4.87 4.4 2.2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/><path d="M12.5 2v3h-3" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          Refresh
        </button>
      </div>
    </div>
  </div>

  <div class="gtv-filters">
    <span class="gtv-fl">Topic</span>
    <button class="gtv-chip active" data-cat="all"      onclick="filterCat('all')">All</button>
    <button class="gtv-chip"        data-cat="ai"       onclick="filterCat('ai')">AI Support</button>
    <button class="gtv-chip"        data-cat="vr"       onclick="filterCat('vr')">VR / AR</button>
    <button class="gtv-chip"        data-cat="avatar"   onclick="filterCat('avatar')">Grief Avatars</button>
    <button class="gtv-chip"        data-cat="chatbot"  onclick="filterCat('chatbot')">Chatbots</button>
    <button class="gtv-chip"        data-cat="cloning"  onclick="filterCat('cloning')">Cloning</button>
    <button class="gtv-chip"        data-cat="robotics" onclick="filterCat('robotics')">Robotics</button>
  </div>

  <div class="gtv-body" id="gtv-body"></div>

  <div class="gtv-footer">
    <span class="gtv-fbrand">The Grief Tech Brief</span>
    <a class="gtv-flink" href="https://grieftech.com" target="_blank" rel="noopener">GriefTech.com ↗</a>
    <span class="gtv-badge">Curated</span>
  </div>
</div>

<script>
const CAT = {
  ai:      {label:'AI Support',    bg:'#0C447C', c:'#9FCAEE'},
  vr:      {label:'VR / AR',       bg:'#065a6e', c:'#7de2f7'},
  avatar:  {label:'Grief Avatars', bg:'#3C3489', c:'#CECBF6'},
  chatbot: {label:'Chatbots',      bg:'#085041', c:'#9FE1CB'},
  cloning: {label:'Cloning',       bg:'#633806', c:'#FAC775'},
  robotics:{label:'Robotics',      bg:'#712B13', c:'#F5C4B3'}
};

// Fallback videos shown before/if AI search loads
const FALLBACK_VIDEOS = [
  {cat:'vr',title:'Could You Have a Conversation With a Dead Relative?',channel:'BBC Click',desc:'BBC explores technology allowing families to interact with AI recreations of deceased loved ones.',url:'https://www.youtube.com/results?search_query=BBC+Click+dead+relative+conversation+AI'},
  {cat:'ai',title:'Grief in the Age of AI: Digital Afterlife Technology',channel:'DW Documentary',desc:'A deep-dive documentary on how AI is reshaping how humans process death and loss.',url:'https://www.youtube.com/results?search_query=DW+Documentary+grief+age+of+AI+digital+afterlife'},
  {cat:'avatar',title:'The Digital Afterlife: Bringing the Dead Back to Life with AI',channel:'Vox',desc:'Vox investigates companies building AI avatars of deceased people and the ethical questions they raise.',url:'https://www.youtube.com/results?search_query=Vox+digital+afterlife+AI+dead'},
  {cat:'chatbot',title:'AI Chatbots That Help You Process Grief and Loss',channel:'CNET',desc:'CNET reviews the latest AI-powered grief support chatbots and what the research says.',url:'https://www.youtube.com/results?search_query=CNET+AI+chatbot+grief+loss'},
  {cat:'cloning',title:'Is It Ethical to Digitally Clone a Deceased Person?',channel:'TED',desc:'A TED speaker examines the moral, legal, and psychological dimensions of recreating the dead through technology.',url:'https://www.youtube.com/results?search_query=TED+ethical+digital+clone+deceased'},
  {cat:'robotics',title:'Japan\'s Robot Companions for Grief and Loneliness',channel:'Reuters',desc:'Reuters reports on how Japanese care homes use social robots to support bereaved residents.',url:'https://www.youtube.com/results?search_query=Reuters+Japan+robot+companion+grief+loneliness'},
  {cat:'vr',title:'Virtual Reality Therapy for Grief — Does It Work?',channel:'Stanford Medicine',desc:'Stanford researchers share findings from clinical trials using VR environments to treat complicated grief.',url:'https://www.youtube.com/results?search_query=Stanford+Medicine+virtual+reality+therapy+grief'},
  {cat:'ai',title:'How AI Is Transforming Bereavement Support',channel:'CBS Mornings',desc:'CBS reports on startups using machine learning to provide grief support at scale.',url:'https://www.youtube.com/results?search_query=CBS+Mornings+AI+bereavement+support'},
  {cat:'avatar',title:'Meeting a Deceased Loved One Through Virtual Reality',channel:'Vice',desc:'Vice follows families who have used immersive VR experiences to reconnect with deceased relatives.',url:'https://www.youtube.com/results?search_query=Vice+deceased+loved+one+virtual+reality'},
  {cat:'cloning',title:'Talking to the Dead: AI Voice Cloning After Loss',channel:'NBC News',desc:'NBC investigates services that clone the voice of a deceased person from audio recordings.',url:'https://www.youtube.com/results?search_query=NBC+News+AI+voice+cloning+deceased'},
  {cat:'chatbot',title:'Replika and the Rise of AI Grief Companions',channel:'The Guardian',desc:'The Guardian examines Replika and similar apps used by bereaved people seeking connection after loss.',url:'https://www.youtube.com/results?search_query=Guardian+Replika+AI+grief+companion'},
  {cat:'robotics',title:'Robotic Pets Helping People Cope With Bereavement',channel:'CNN',desc:'CNN looks at how lifelike robotic animals comfort grieving individuals in care settings.',url:'https://www.youtube.com/results?search_query=CNN+robotic+pets+bereavement+grief'}
];

let VIDEOS = [...FALLBACK_VIDEOS];

let activeCat = 'all';

function render(){
  const list = activeCat==='all' ? VIDEOS : VIDEOS.filter(v=>v.cat===activeCat);
  const body = document.getElementById('gtv-body');
  if(!list.length){body.innerHTML=`<div class="gtv-empty">No videos for this topic.</div>`;return;}
  body.innerHTML = list.map(v=>{
    const m = CAT[v.cat]||CAT.ai;
    return `<a class="gtv-row" href="${v.url}" target="_blank" rel="noopener">
      <div class="gtv-row-icon">
        <svg viewBox="0 0 20 20" fill="none">
          <circle cx="10" cy="10" r="8.5" stroke="${m.c}" stroke-width="1.2"/>
          <polygon points="8,6.5 15,10 8,13.5" fill="${m.c}"/>
        </svg>
      </div>
      <div class="gtv-row-body">
        <div class="gtv-row-meta">
          <span class="gtv-cat-tag" style="background:${m.bg};color:${m.c}">${m.label}</span>
          <span class="gtv-channel">${v.channel}</span>
        </div>
        <div class="gtv-row-title">${v.title}</div>
        <div class="gtv-row-desc">${v.desc}</div>
      </div>
      <div class="gtv-row-arrow">›</div>
    </a>`;
  }).join('');
}

function filterCat(c){
  activeCat=c;
  document.querySelectorAll('.gtv-chip').forEach(el=>el.classList.toggle('active',el.dataset.cat===c));
  render();
}

async function fetchVideos(){
  const btn = document.getElementById('gtv-refresh');
  const lbl = document.getElementById('lbl-status');
  btn.disabled=true; btn.style.opacity='0.5';
  lbl.innerHTML='<span class="gtv-spinner"></span>Searching for latest grief tech videos…';

  const prompt=`Search YouTube and the web right now for the latest available videos (2024-2025) on these grief technology topics:
- AI grief support and bereavement technology
- Virtual reality grief therapy and memorials  
- Grief avatars and digital afterlife
- Grief chatbots and AI bereavement assistants
- Digital cloning of deceased persons
- Grief support and companion robots

For each video found return a JSON array of 14-18 items. Each object must have:
- title: exact video title (string)
- channel: YouTube channel name (string)
- desc: one sentence description max 20 words (string)
- url: the direct YouTube watch URL e.g. https://www.youtube.com/watch?v=XXXXXXXXXXX (string)
- cat: one of ai|vr|avatar|chatbot|cloning|robotics (string)

Only include videos you found via web search with real YouTube URLs. Cover all cat values.
Return ONLY a valid JSON array. No markdown, no explanation, no code fences.`;

  try{
    const res = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:2000,
        tools:[{type:'web_search_20250305',name:'web_search'}],
        system:'You are a video researcher for a grief technology publication. Search the web and YouTube thoroughly to find real, currently available YouTube videos on grief technology topics. Return only confirmed real YouTube URLs you found via search. Return only valid JSON.',
        messages:[{role:'user',content:prompt}]
      })
    });
    const data = await res.json();
    const txt = (data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const match = txt.replace(/```json|```/g,'').trim().match(/\[[\s\S]*\]/);
    if(!match) throw new Error('No results');
    const parsed = JSON.parse(match[0]);
    const seen = new Set();
    const fresh = parsed.filter(v=>{
      if(!v.url||!v.title||seen.has(v.url)) return false;
      if(!CAT[v.cat]) v.cat='ai';
      seen.add(v.url); return true;
    });
    if(fresh.length>0){
      VIDEOS = [...fresh, ...FALLBACK_VIDEOS.filter(f=>!seen.has(f.url))];
      lbl.textContent='Updated ' + new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});
    } else {
      throw new Error('No valid results');
    }
  }catch(e){
    VIDEOS = [...FALLBACK_VIDEOS];
    lbl.textContent='Curated grief tech videos';
  }
  btn.disabled=false; btn.style.opacity='1';
  render();
}

document.getElementById('gtv-date').textContent =
  new Date().toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
render();
fetchVideos();
setInterval(fetchVideos, 7200000);
</script>
</body>
</html>
